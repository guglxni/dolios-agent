version: "1.0"
metadata:
  name: dolios-default
  description: Base network and sandbox policy for Dolios agent

network:
  default: deny
  allow:
    # Inference providers
    - host: "integrate.api.nvidia.com"
      ports: [443]
      label: "NVIDIA Nemotron"
    - host: "openrouter.ai"
      ports: [443]
      label: "OpenRouter"
    - host: "portal.nousresearch.com"
      ports: [443]
      label: "Nous Portal"
    - host: "api.openai.com"
      ports: [443]
      label: "OpenAI"
    - host: "api.anthropic.com"
      ports: [443]
      label: "Anthropic"
    - host: "api.moonshot.ai"
      ports: [443]
      label: "Kimi / Moonshot"
    - host: "api.minimax.chat"
      ports: [443]
      label: "MiniMax"

    # Core tool requirements
    - host: "api.github.com"
      ports: [443]
      label: "GitHub API"
    - host: "github.com"
      ports: [443]
      label: "GitHub"
    - host: "*.googleapis.com"
      ports: [443]
      label: "Google APIs (search)"
    - host: "api.search.brave.com"
      ports: [443]
      label: "Brave Search"

    # Package registries (for sandbox setup)
    - host: "pypi.org"
      ports: [443]
      label: "PyPI"
    - host: "files.pythonhosted.org"
      ports: [443]
      label: "PyPI files"
    - host: "registry.npmjs.org"
      ports: [443]
      label: "npm registry"

filesystem:
  writable:
    - /sandbox/workspace
    - /sandbox/skills
    - /sandbox/memory
    - /tmp
  readonly:
    - /sandbox/dolios/brand
    - /sandbox/dolios/policies

process:
  allow_privilege_escalation: false
  blocked_syscalls:
    - ptrace
    - mount
    - reboot
    - kexec_load
    - init_module
    - finit_module
