<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&amp;display=swap');
    </style>
  </defs>

  <!-- Left: Delta icon -->
  <g transform="translate(0, 4)">
    <!-- Delta triangle -->
    <polygon points="36,4 4,68 68,68" fill="none" stroke="#1A1A2E" stroke-width="3" stroke-linejoin="round"/>
    <!-- Node graph connections -->
    <line x1="36" y1="22" x2="24" y2="50" stroke="#0F3460" stroke-width="1.5"/>
    <line x1="36" y1="22" x2="48" y2="50" stroke="#0F3460" stroke-width="1.5"/>
    <line x1="24" y1="50" x2="48" y2="50" stroke="#0F3460" stroke-width="1.5"/>
    <!-- Node dots -->
    <circle cx="36" cy="22" r="3.5" fill="#E94560"/>
    <circle cx="24" cy="50" r="3.5" fill="#E94560"/>
    <circle cx="48" cy="50" r="3.5" fill="#E94560"/>
  </g>

  <!-- Right: Wordmark -->
  <text x="90" y="50" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-weight="700" font-size="48" fill="#1A1A2E" letter-spacing="3">DOLIOS</text>

  <!-- Tagline below wordmark -->
  <text x="92" y="72" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-weight="500" font-size="11" fill="#6B7280" letter-spacing="4">THE CRAFTY AGENT</text>
</svg>
